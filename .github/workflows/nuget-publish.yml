name: Publish to NuGet

on:
  push:
    tags:
      # Only publish on version tags, not arbitrary tags. Covers stable (8.1.0)
      # and pre-release (8.2.0-beta) tags, with or without a leading 'v'.
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

# Needed for the Create GitHub Release step to create a release and upload assets.
permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v6
      with:
        dotnet-version: |
            10.0.x
            9.0.x
            8.0.x

    - name: Get Version
      id: get_version
      run: |
        TAG=${GITHUB_REF#refs/tags/}
        echo "VERSION=${TAG#v}" >> $GITHUB_ENV

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore -c Release -p:Version=${{ env.VERSION }}

    - name: Pack
      run: dotnet pack --no-build -c Release -p:PackageVersion=${{ env.VERSION }} -o ./artifacts

    - name: Push to NuGet
      run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        # Auto-generate notes from PRs merged since the previous tag (grouped per
        # .github/release.yml). Mark pre-release tags (those with a '-' suffix).
        PRERELEASE=""
        case "$VERSION" in
          *-*) PRERELEASE="--prerelease" ;;
        esac
        gh release create "$GITHUB_REF_NAME" \
          --title "$GITHUB_REF_NAME" \
          --generate-notes \
          --verify-tag \
          $PRERELEASE \
          ./artifacts/*.nupkg

services:
  etcd1:
    image: quay.io/coreos/etcd:v3.5.21
    container_name: etcd1
    ports:
      - "2379:2379"
      - "2380:2380"
    environment:
      - ETCD_NAME=etcd1
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd1:2380
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd1:2379
      - ETCD_INITIAL_CLUSTER=etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      - ETCD_INITIAL_CLUSTER_STATE=new
      - ETCD_INITIAL_CLUSTER_TOKEN=etcd-cluster
    restart: always
    networks:
      - etcd-net

  etcd2:
    image: quay.io/coreos/etcd:v3.5.21
    container_name: etcd2
    ports:
      - "22379:2379"
      - "22380:2380"
    environment:
      - ETCD_NAME=etcd2
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd2:2380
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd2:2379
      - ETCD_INITIAL_CLUSTER=etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      - ETCD_INITIAL_CLUSTER_STATE=new
      - ETCD_INITIAL_CLUSTER_TOKEN=etcd-cluster
    restart: always
    networks:
      - etcd-net

  etcd3:
    image: quay.io/coreos/etcd:v3.5.21
    container_name: etcd3
    ports:
      - "32379:2379"
      - "32380:2380"
    environment:
      - ETCD_NAME=etcd3
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd3:2380
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd3:2379
      - ETCD_INITIAL_CLUSTER=etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      - ETCD_INITIAL_CLUSTER_STATE=new
      - ETCD_INITIAL_CLUSTER_TOKEN=etcd-cluster
    restart: always
    networks:
      - etcd-net

  # etcd instance with SSL enabled for testing SSL certificate configuration
  etcd-ssl:
    image: quay.io/coreos/etcd:v3.5.21
    container_name: etcd-ssl
    ports:
      - "2389:2379"  # SSL-enabled client port
    volumes:
      - ./certs:/certs:ro
    environment:
      - ETCD_NAME=etcd-ssl
      - ETCD_LISTEN_CLIENT_URLS=https://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=https://localhost:2389
      - ETCD_CERT_FILE=/certs/server.pem
      - ETCD_KEY_FILE=/certs/server-key.pem  
      - ETCD_CLIENT_CERT_AUTH=false  # Set to true for mutual TLS
    restart: always
    networks:
      - etcd-net

  # Single-node etcd with a very short auth-token TTL, used to verify the client renews its token
  # after the server expires it (issue #283). Isolated on its own port so the short TTL does not
  # affect the other auth tests running against the main cluster.
  etcd-authttl:
    image: quay.io/coreos/etcd:v3.5.21
    container_name: etcd-authttl
    ports:
      - "2399:2379"
    command:
      - /usr/local/bin/etcd
      - --name=etcd-authttl
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://localhost:2399
      - --auth-token=simple
      - --auth-token-ttl=2
    restart: always
    networks:
      - etcd-net

networks:
  etcd-net:
    driver: bridge